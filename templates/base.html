<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Gestion Stock NGO{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-boxes me-2"></i>Stock NGO
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle {% if request.endpoint == 'inventory' %}active{% endif %}"
             href="#" data-bs-toggle="dropdown">
            <i class="bi bi-list-ul me-1"></i>Inventaire
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="/inventory">Tout</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="/inventory?location=Rex">Centre Rex</a></li>
            <li><a class="dropdown-item" href="/inventory?location=Ankofafa">Centre Miaraka Ankofafa</a></li>
            <li><a class="dropdown-item" href="/inventory?location=Fille">Centre Miaraka Fille</a></li>
          </ul>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'library' %}active{% endif %}" href="/library">
            <i class="bi bi-book me-1"></i>Bibliothèque
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'mouvements' %}active{% endif %}" href="/mouvements">
            <i class="bi bi-arrow-left-right me-1"></i>Mouvements
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
