<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — La Vita per Te</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f6fa; font-family: Arial, sans-serif; }
    .brand-bar { height: 4px; background: linear-gradient(90deg,#c0392b,#e74c3c,#e67e22); }
    .login-card {
      max-width: 400px; width: 100%;
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 2.5rem 2rem;
    }
    .login-logo { max-height: 72px; }
    .btn-login {
      background: #c0392b; border-color: #c0392b; color: #fff;
      border-radius: 8px; font-weight: 600; letter-spacing: .03em;
    }
    .btn-login:hover { background: #a93226; border-color: #a93226; color: #fff; }
    .form-control { border-radius: 8px; }
    .form-label { font-size: .82rem; font-weight: 600; text-transform: uppercase;
                  letter-spacing: .04em; color: #95a5a6; }
    .input-group-text { border-radius: 8px 0 0 8px !important; background: #f8f9fa; }
  </style>
</head>
<body>
<div class="brand-bar"></div>
<div class="d-flex align-items-center justify-content-center min-vh-100 py-5">
  <div class="login-card">

    <div class="text-center mb-4">
      <img src="{{ url_for('static', filename='img/logo.png') }}"
           class="login-logo mb-3"
           onerror="this.style.display='none'">
      <h5 class="fw-bold text-dark mb-0">Gestion de Stock</h5>
      <small class="text-muted">Connectez-vous pour accéder à votre espace</small>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <div class="mb-3">
        <label class="form-label">Utilisateur</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
          <input type="text" name="username" class="form-control"
                 placeholder="Nom d'utilisateur" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Mot de passe</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="password" id="pwdInput"
                 class="form-control" placeholder="••••••••" required>
          <button class="btn btn-outline-secondary" type="button"
                  onclick="togglePwd()" tabindex="-1" style="border-radius:0 8px 8px 0">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-login w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
      </button>
    </form>

  </div>
</div>
<script>
function togglePwd() {
  const inp = document.getElementById('pwdInput');
  const ico = document.getElementById('eyeIcon');
  if (inp.type === 'password') { inp.type = 'text';     ico.className = 'bi bi-eye-slash'; }
  else                         { inp.type = 'password'; ico.className = 'bi bi-eye'; }
}
</script>
</body>
</html>
