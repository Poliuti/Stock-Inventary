<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 100" width="220" height="100">

  <!-- Stick figure — head -->
  <circle cx="52" cy="18" r="9" fill="#e8412a"/>

  <!-- Body -->
  <line x1="52" y1="27" x2="52" y2="56" stroke="#e8412a" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Left arm up-left -->
  <line x1="52" y1="36" x2="32" y2="24" stroke="#e8412a" stroke-width="5" stroke-linecap="round"/>
  <!-- Right arm up-right -->
  <line x1="52" y1="36" x2="72" y2="24" stroke="#e8412a" stroke-width="5" stroke-linecap="round"/>

  <!-- Left leg -->
  <line x1="52" y1="56" x2="36" y2="74" stroke="#e8412a" stroke-width="5" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="52" y1="56" x2="68" y2="74" stroke="#e8412a" stroke-width="5" stroke-linecap="round"/>

  <!-- ONG-ODV label beside figure -->
  <text x="6" y="42" font-family="Arial" font-size="7" font-weight="bold" fill="#e8412a">ONG-ODV</text>
  <text x="6" y="51" font-family="Arial" font-size="7" font-weight="bold" fill="#e8412a">ALFEO</text>
  <text x="6" y="60" font-family="Arial" font-size="7" font-weight="bold" fill="#e8412a">CORASSORI</text>

  <!-- Main text: "la " small -->
  <text x="82" y="66" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic" fill="#1a1a1a">la </text>

  <!-- "V" large bold -->
  <text x="105" y="66" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" font-style="italic" fill="#1a1a1a">V</text>
  <!-- "ita" normal -->
  <text x="127" y="66" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic" fill="#1a1a1a">ita</text>

  <!-- "per " second line small -->
  <text x="82" y="90" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic" fill="#1a1a1a">per </text>

  <!-- "T" large bold -->
  <text x="114" y="90" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" font-style="italic" fill="#1a1a1a">T</text>
  <!-- "e" normal -->
  <text x="132" y="90" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic" fill="#1a1a1a">e</text>

</svg>
